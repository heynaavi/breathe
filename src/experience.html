<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Breathe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; -webkit-app-region: no-drag; }
    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      display: flex; align-items: center; justify-content: center;
      cursor: default; user-select: none;
      -webkit-font-smoothing: antialiased;
    }
    .backdrop {
      position: fixed; inset: -2px; background: #000; opacity: 0;
      transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .backdrop.visible { opacity: 1; }
    .container {
      position: relative; z-index: 10;
      text-align: center; max-width: 500px; padding: 2rem;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 0;
    }
    .message {
      font-size: 1.3rem; font-weight: 300; letter-spacing: 0.03em;
      line-height: 1.6; color: rgba(232, 228, 224, 0.9);
      opacity: 0; transform: translateY(6px);
      transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 2.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .message.visible { opacity: 1; transform: translateY(0); }
    .begin-btn {
      position: absolute; top: calc(50% + 3rem);
      padding: 0.9rem 2.5rem;
      background: transparent; border: 1px solid rgba(232, 228, 224, 0.25);
      color: rgba(232, 228, 224, 0.8); font-size: 0.9rem; font-weight: 300;
      letter-spacing: 0.3em; cursor: pointer;
      opacity: 0; transform: translateY(8px);
      transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 2s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.4s ease;
      pointer-events: none;
    }
    .begin-btn.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .begin-btn:hover { border-color: rgba(232, 228, 224, 0.5); }
    .cursor-hidden { cursor: none !important; }
    .dot {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(232, 228, 224, 0.35); opacity: 0; z-index: 10;
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dot.visible { opacity: 1; }
    .feedback {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; z-index: 10;
      pointer-events: none;
    }
    .feedback-welcome {
      font-size: 1.3rem; font-weight: 300; letter-spacing: 0.03em;
      color: rgba(232, 228, 224, 0.9); margin-bottom: 2.5rem;
      opacity: 0; transform: translateY(6px);
      transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 2.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .feedback-welcome.visible { opacity: 1; transform: translateY(0); }
    .feedback-bottom {
      opacity: 0; transform: translateY(6px);
      transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 2s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    .feedback-bottom.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .feedback-question {
      font-size: 1.2rem; font-weight: 300; letter-spacing: 0.02em;
      color: rgba(232, 228, 224, 0.85); margin-bottom: 2rem;
    }
    .feedback-buttons { display: flex; gap: 1.2rem; justify-content: center; }
    .feedback-btn {
      padding: 0.75rem 2.2rem; background: transparent;
      border: 1px solid rgba(232, 228, 224, 0.25);
      color: rgba(232, 228, 224, 0.75); font-size: 0.85rem;
      font-weight: 300; letter-spacing: 0.08em; cursor: pointer;
      transition: border-color 0.3s ease;
    }
    .feedback-btn:hover { border-color: rgba(232, 228, 224, 0.5); }
    .timer {
      position: fixed; bottom: 3rem; left: 50%; transform: translateX(-50%);
      font-size: 0.8rem; font-weight: 300; letter-spacing: 0.15em;
      color: rgba(232, 228, 224, 0.25); opacity: 0;
      transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10;
    }
    .timer.visible { opacity: 1; }
    .exit-hint {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: 0.65rem; font-weight: 300; letter-spacing: 0.1em;
      color: rgba(232, 228, 224, 0.12); opacity: 0;
      transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10;
    }
    .exit-hint.visible { opacity: 1; }
    .hotkey-hint {
      position: fixed; top: calc(50% + 3.5rem); left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 0.35rem; z-index: 10;
      opacity: 0; transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hotkey-hint.visible { opacity: 1; }
    .hotkey-hint.hiding { opacity: 0; }
    .key {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 2rem; height: 1.7rem; padding: 0 0.5rem;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      font-size: 0.85rem; font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }
    .key-plus {
      min-width: auto; padding: 0;
      background: none; border: none;
      font-size: 0.6rem;
      color: rgba(232, 228, 224, 0.25);
    }
    .key-b { font-size: 0.9rem; font-weight: 500; }
  </style>
</head>
<body>
  <div class="backdrop" id="backdrop"></div>
  <div class="container">
    <p class="message" id="message"></p>
    <button class="begin-btn" id="beginBtn">B e g i n</button>
  </div>
  <div class="dot" id="dot"></div>
  <div class="feedback" id="feedback">
    <p class="feedback-welcome" id="feedbackWelcome">Welcome back</p>
    <div class="feedback-bottom" id="feedbackBottom">
      <p class="feedback-question">Did it slow down?</p>
      <div class="feedback-buttons">
        <button class="feedback-btn" onclick="handleFeedback(true)">Yes</button>
        <button class="feedback-btn" onclick="handleFeedback(false)">Not really</button>
      </div>
    </div>
  </div>
  <div class="timer" id="timer"></div>
  <div class="exit-hint" id="exitHint">esc to leave</div>
  <div class="hotkey-hint" id="hotkeyHint">
    <span class="key" id="keyMod">⌘</span>
    <span class="key-plus">+</span>
    <span class="key" id="keyShift">⇧</span>
    <span class="key-plus">+</span>
    <span class="key key-b">B</span>
  </div>
  <script src="experience.js"></script>
</body>
</html>
